name: Launch Test

run-name: ${{ github.actor }} push

on:
    push:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                node-version: v20
            - name: Install dependences
              run: npm ci
            - name: Launch Test
              run: npm test